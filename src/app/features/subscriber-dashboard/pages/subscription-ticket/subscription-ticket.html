<div class="tickets-container">

  <div class="card">
  <h2 class="card-title">Create New Ticket</h2>

  <div class="form-grid">
    <div class="form-group">
      <label>PhoneNumber</label>
      <input type="text" [(ngModel)]="phone" placeholder="Enter your phone number">
    </div>

    <div class="form-group">
      <label>Category</label>
      <div class="select-wrapper">
        <select [(ngModel)]="type">
          <option value="" disabled>Select a category</option>
          <option value="technical">Technical</option>
          <option value="Commerce">Commerce</option>
        </select>
        <i class="fa-solid fa-chevron-down dropdown-icon"></i>
      </div>
    </div>
  </div>

  <div class="form-group">
    <label>Message</label>
    <textarea rows="4" [(ngModel)]="message"
      placeholder="Please provide detailed information about your issue ..">
    </textarea>
  </div>

  <div class="form-actions">
    <button class="btn-primary" (click)="submit()">
      <i class="fa-regular fa-paper-plane"></i> Send
    </button>
  </div>
</div>

<div class="card">
  <h2 class="card-title">My Tickets</h2>

  <div class="table-responsive">
    <table class="tickets-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Subject <i class="fa-solid fa-chevron-down icon-xs"></i></th>
          <th>Category <i class="fa-solid fa-chevron-down icon-xs"></i></th>
          <th>Date <i class="fa-solid fa-chevron-down icon-xs"></i></th>
          <th>Status <i class="fa-solid fa-chevron-down icon-xs"></i></th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        @for (ticket of myTickets; track ticket.id; let i = $index) {
          <tr>
            <td>{{ i + 1 }}</td>
            <td class="fw-bold">{{ ticket.message }}</td>
            <td class="text-muted">{{ ticket.type | titlecase }}</td>
            <td class="text-muted">{{ ticket.complaintDate | date:'dd-MMM' }}</td>
            <td>
              <span class="badge" [ngClass]="getStatus(ticket).class">
                <span class="dot"></span> {{ getStatus(ticket).label }}
              </span>
            </td>
            <td>
              <button class="icon-btn"><i class="fa-solid fa-ellipsis-vertical"></i></button>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="6" class="text-center py-4">No tickets found.</td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  <div class="pagination-container" *ngIf="myTickets.length > 0">
    <ul class="pagination">
      <li><button class="page-btn text-muted"><i class="fa-solid fa-chevron-left icon-xs"></i> Back</button></li>
      <li><button class="page-btn active">1</button></li>
      <li><button class="page-btn text-muted">Next <i class="fa-solid fa-chevron-right icon-xs"></i></button></li>
    </ul>
  </div>
</div>
</div>
