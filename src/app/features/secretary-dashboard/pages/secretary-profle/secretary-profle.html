<div class="profile-container" [formGroup]="profileForm">

  <div class="card">
    <div class="card-header">
      <div class="header-title">
        <div class="icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
        <h2>Profile Information</h2>
      </div>
      <button class="edit-btn" *ngIf="!editModes.profileInfo" (click)="toggleEdit('profileInfo')">Edit</button>
      <button class="save-btn" *ngIf="editModes.profileInfo" (click)="saveSection('profileInfo')">Save</button>
    </div>

    <div class="avatar-section">
  <div class="avatar">
    {{ userInitials }}
  </div>
  <div class="avatar-text">
    <p>Upload a professional photo</p>
    <span>JPG or PNG, max 5MB</span>
  </div>
</div>

    <div class="form-grid">
      <div class="form-group">
        <label>Full name</label>
        <input type="text" formControlName="fullName" />
      </div>
      <div class="form-group">
        <label>Suggested Username</label>
        <input type="text" formControlName="suggestedUsername" />
      </div>
      <div class="form-group">
        <label>Job Title / Department</label>
        <input type="text" formControlName="jobTitle" />
      </div>
      <div class="form-group">
        <label>Start Date</label>
        <input type="date" formControlName="startDate" />
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="header-title">
        <div class="icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
        </div>
        <h2>Work & Contact Info</h2>
      </div>
      <button class="edit-btn" *ngIf="!editModes.workContact" (click)="toggleEdit('workContact')">Edit</button>
      <button class="save-btn" *ngIf="editModes.workContact" (click)="saveSection('workContact')">Save</button>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label>Work Email</label>
        <input type="email" formControlName="email" />
      </div>
      <div class="form-group">
        <label>Work Mobile</label>
        <input type="text" formControlName="phone" />
      </div>
      <div class="form-group">
        <label>Preferred Language</label>
        <input type="text" formControlName="language" />
      </div>
      <div class="form-group">
        <label>Time Zone</label>
        <input type="text" formControlName="timeZone" />
      </div>
      <div class="form-group">
        <label>Work Location</label>
        <input type="text" formControlName="workLocation" />
      </div>
      <div class="form-group">
        <label>Email Signature</label>
        <input type="text" formControlName="emailSignature" />
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
       <div class="header-title">
        <div class="icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><path d="m9 12 2 2 4-4"></path></svg>
        </div>
        <h2>Security & Access</h2>
      </div>
      <button class="edit-btn" *ngIf="!editModes.securityAccess" (click)="toggleEdit('securityAccess')">Edit</button>
      <button class="save-btn" *ngIf="editModes.securityAccess" (click)="saveSection('securityAccess')">Save</button>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label>Employee ID</label>
        <input type="text" formControlName="employeeId" />
      </div>
      <div class="form-group">
        <label>Recovery Email</label>
        <input type="email" formControlName="recoveryEmail" />
      </div>
      <div class="form-group">
        <label>Emergency Contact</label>
        <input type="text" formControlName="emergencyContact" />
      </div>
      <div class="form-group">
        <label>Assigned Devices</label>
        <div class="device-list">
          <div class="device-item">💻 MacBook Pro 16"</div>
          <div class="device-item">📱 iPhone 14 Pro</div>
        </div>
      </div>
    </div>
  </div>
</div>
